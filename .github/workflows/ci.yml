name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    name: Validate (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest -q

      - name: Compile .codex helper scripts
        run: python -m compileall .codex/scripts

      - name: CLI smoke check
        run: python -m ov10.cli --help

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Python dev dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.11

      - name: Expose Go binaries
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery

      - name: YamlLint
        run: python -m yamllint .github/workflows/ci.yml .codex/SYSTEM_STATE.yaml

      - name: Actionlint
        run: actionlint

      - name: ESLint Apps Script
        run: npm run lint:apps-script

      - name: Markdownlint
        run: npm run lint:markdown

      - name: Pyright
        run: npm run typecheck:python

      - name: ShellCheck
        run: shellcheck .codex/scripts/watchdog_loop.sh

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer `
            -Path '.codex/scripts/*.ps1' `
            -Settings 'PSScriptAnalyzerSettings.psd1' `
            -EnableExit

      - name: SQLFluff
        run: python -m sqlfluff lint sql

      - name: Pip Audit
        run: python -m pip_audit --progress-spinner off --skip-editable

      - name: NPM Audit
        run: npm run audit:node
